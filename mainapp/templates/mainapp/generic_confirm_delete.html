{% extends 'mainapp/base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 bg-white p-4 rounded shadow-sm text-center border">
        <h3 class="text-danger mb-4">Сенімдісіз бе?</h3>
        <p class="fs-5">Сіз осы жазбаны шынымен жойғыңыз келе ме?</p>
        <form method="post" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Иә, жою</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Бас тарту</a>
        </form>
    </div>
</div>
{% endblock %}
