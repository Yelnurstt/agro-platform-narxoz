{% extends 'mainapp/base.html' %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm p-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0" style="color: #2E7D32;">{{ product.name }}</h2>
                <span class="badge bg-success fs-6">{{ product.category.name }}</span>
            </div>
            
            <h4 class="text-muted mb-4">{{ product.price }} KZT</h4>
            
            <div class="bg-light p-3 rounded mb-4">
                <strong>Производитель:</strong> {{ product.farmer.farm_name }}<br>
                <strong>Локация:</strong> {{ product.farmer.location }}
            </div>
            
            <p class="fs-5 mb-5">{{ product.description }}</p>
            
            <div>
                <a href="{% url 'product_list' %}" class="btn btn-light border me-2">← Назад в каталог</a>
                <button class="btn btn-custom">Добавить в корзину</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
