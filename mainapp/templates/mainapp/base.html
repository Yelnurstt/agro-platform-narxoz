<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
        font-family: 'Montserrat', sans-serif; /* Более современный и комфортный шрифт */
        background-color: #f8f9fa;
        color: #333;
    }
    .navbar-brand {
        font-weight: 700;
        color: #2E7D32 !important;
        text-transform: uppercase;
    }
    /* Добавим немного плавности кнопке */
    .btn-custom {
        background-color: #2E7D32;
        color: white;
        padding: 12px 30px;
        font-weight: 600;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        background-color: #1B5E20;
    }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">AGRO PLATFORM</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">О нас</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'product_list' %}">Продукция</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Контакты</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-4 text-center mt-auto">
        <div class="container"><small>&copy; 2026 Agro Platform. CEO Сайлаубеков Елнұр Төлегенұлы.</small></div>
    </footer>
</body>
</html>
