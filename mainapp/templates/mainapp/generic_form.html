{% extends 'mainapp/base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 bg-white p-4 rounded shadow-sm border">
        <h3 class="fw-bold mb-4 text-center" style="color: #2E7D32;">Форма толтыру</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-custom">Сақтау</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
